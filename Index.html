<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All The Discounts | Best Seller Deal Finder</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>

<header>
    <h1 class="site-title">All The Discounts</h1>
    <p class="tagline">Search Hidden Amazon Best Seller Deals</p>
</header>

<div class="search-container">
    <h3>1. Search All Categories</h3>
    <input type="text" id="search-box" placeholder="Keywords (e.g. Marvel, Sony)..." inputmode="search" />
    
    <div class="advanced-row">
        <div class="price-inputs">
            <input type="number" id="min-price" placeholder="Min $" />
            <input type="number" id="max-price" placeholder="Max $" />
        </div>
        <select id="sort-order">
            <option value="featured-rank" selected>Best Sellers</option>
            <option value="price-asc-rank">Price: Low to High</option>
            <option value="review-rank">Top Rated</option>
        </select>
    </div>

    <div class="filter-controls">
        <select id="discount-main">
            <option value="50-99" selected>50%+ Off</option>
            <option value="60-99">60%+ Off</option>
            <option value="70-99">70%+ Off</option>
            <option value="80-99">80%+ Off</option>
            <option value="90-99">90%+ Off</option>
        </select>
        <label><input type="checkbox" id="prime-only"> Prime Only</label>
    </div>

    <button class="main-search-btn" onclick="searchDealsFromBar()">Search Amazon</button>
    <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
</div>

<div class="container">
