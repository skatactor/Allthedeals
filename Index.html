<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All The Discounts | Best Seller Deal Finder</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>

<header>
    <h1 class="site-title">All The Discounts</h1>
    <p class="tagline">Hidden Best Seller Deals</p>
</header>

<div class="search-container">
    <input type="text" id="search-box" placeholder="Search keywords (e.g. Marvel)..." inputmode="search" />
    
    <div class="filter-controls">
        <select id="discount">
            <option value="all">Any Discount</option>
            <option value="30-99">30%+ Off</option>
            <option value="50-99" selected>50%+ Off</option>
            <option value="70-99">70%+ Off</option>
        </select>

        <label class="prime-label">
            <input type="checkbox" id="prime-only"> Prime Only
        </label>
    </div>

    <button class="main-search-btn" onclick="searchDealsFromBar()">Find Deals</button>
</div>

<div class="container">
    <h2 class="section-title">Books & Comics</h2>
    <div class="category-grid">
        <div class="category-card book-card" onclick="searchDeals('283155', getDiscount(), getKW(), 'stripbooks')">
            <span>📚 All Books</span>
        </div>
        <div class="category-card book-card" onclick="searchDeals('4366', getDiscount(), getKW(), 'stripbooks')">
            <span>🦸 Graphic Novels</span>
        </div>
        <div class="category-card book-card" onclick="searchDeals('4400', getDiscount(), getKW(), 'stripbooks')">
            <span>🔥 Manga</span>
        </div>
        <div class="category-card book-card" onclick="searchDeals('11350', getDiscount(), getKW(), 'stripbooks')">
            <span>🎨 Art & Design</span>
        </div>
    </div>

    <h2 class="section-title">Tech & Gear</h2>
    <div class="category-grid">
        <div class="category-card" onclick="searchDeals('172630', getDiscount(), getKW(), 'electronics')">
            <span>🎧 Headphones</span>
        </div>
        <div class="category-card" onclick="searchDeals('1232597011', getDiscount(), getKW(), 'pc')">
            <span>📱 Tablets</span>
        </div>
        <div class="category-card" onclick="searchDeals('7939902011', getDiscount(), getKW(), 'electronics')">
            <span>⌚ Smart Watches</span>
        </div>
        <div class="category-card" onclick="searchDeals('11036071', getDiscount(), getKW(), 'pc')">
            <span>🖱️ PC Gaming</span>
        </div>
    </div>

    <h2 class="section-title">Lifestyle</h2>
    <div class="category-grid">
        <div class="category-card" onclick="searchDeals('7141123011', getDiscount(), getKW(), 'clothing')">
            <span>👗 Clothing</span>
        </div>
        <div class="category-card" onclick="searchDeals('165793011', getDiscount(), getKW(), 'toys-and-games')">
            <span>🧸 Toys & Games</span>
        </div>
        <div class="category-card" onclick="searchDeals('1055398', getDiscount(), getKW(), 'home-garden')">
            <span>🏠 Home</span>
        </div>
        <div class="category-card" onclick="searchDeals('11055981', getDiscount(), getKW(), 'tools')">
            <span>🛠️ Tools</span>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 All The Discounts | Best Seller Search Tool</p>
</footer>

</body>
</html>
