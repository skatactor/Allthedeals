<div class="search-container">
    <h3 class="card-label">Custom Search</h3>
    
    <label class="input-label" for="search-box">Keywords</label>
    <input type="text" id="search-box" placeholder="e.g. Marvel, Sony, Kitchen..." inputmode="search" />
    
    <div class="advanced-row">
        <div class="price-group">
            <label class="input-label">Price Range</label>
            <div class="price-inputs">
                <input type="number" id="min-price" placeholder="Min $" />
                <input type="number" id="max-price" placeholder="Max $" />
            </div>
        </div>

        <div class="sort-group">
            <label class="input-label" for="sort-order">Sort By</label>
            <select id="sort-order">
                <option value="relevancerank" selected>Best Sellers</option>
                <option value="date-desc-rank">Newest Arrivals</option>
                <option value="price-asc-rank">Price: Low to High</option>
            </select>
        </div>
    </div>

    <div class="filter-controls">
        <div class="discount-group">
            <label class="input-label">Minimum Discount</label>
            <select id="discount-main">
                <option value="25-99">25%+ Off</option>
                <option value="30-99">30%+ Off</option>
                <option value="40-99">40%+ Off</option>
                <option value="50-99" selected>50%+ Off</option>
                <option value="60-99">60%+ Off</option>
                <option value="70-99">70%+ Off</option>
                <option value="80-99">80%+ Off</option>
                <option value="90-99">90%+ Off</option>
            </select>
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="prime-only"> Prime</label>
            <label><input type="checkbox" id="amazon-only"> Amazon Only</label>
        </div>
    </div>

    <button class="main-search-btn" onclick="searchDealsFromBar()">Find My Deals</button>
    <button class="reset-btn" onclick="resetFilters()">Reset All Filters</button>
</div>
